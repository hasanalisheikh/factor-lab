name: Run Worker

on:
  schedule:
    # Safety-net: process any queued jobs every 15 minutes even if the Render
    # long-running worker is down. This is NOT a substitute for the primary
    # Render service — it only catches jobs that have been queued > ~15 min.
    - cron: "*/15 * * * *"
  repository_dispatch:
    types: [run-worker]

concurrency:
  group: run-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install engine
        run: pip install -e services/engine

      - name: Run worker
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_ONCE: "1"
        run: python -m factorlab_engine.worker
        working-directory: services/engine
